{% extends 'base.html' %}

{% block content %}
<h2>Checkout 💳</h2>

<form method="post">
    {% csrf_token %}

    <label>Delivery Address:</label><br>
    <textarea name="address" required></textarea><br><br>

    <h3>Order Summary</h3>

    {% for item in items %}
        <p>{{ item.product.name }} (x{{ item.quantity }})</p>
    {% endfor %}

    <h3>Total: ₹{{ total }}</h3>

    <button type="submit">Place Order</button>
</form>

{% endblock %}
