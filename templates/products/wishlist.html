{% extends 'base.html' %}

{% block content %}

<h2>❤️ My Wishlist</h2>

<div style="display:flex; gap:20px; flex-wrap:wrap;">

{% for item in items %}
    <div style="border:1px solid #ccc; padding:10px;">
        <img src="{{ item.product.image.url }}" width="150">
        <h4>{{ item.product.name }}</h4>
        <p>₹{{ item.product.price }}</p>
    </div>
{% endfor %}

</div>

{% endblock %}
